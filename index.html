<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menú de Vicky</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1A0A2E;--bg2:#241040;--bg3:#2E1550;--card:#2A1245;--card2:#321558;
  --violet:#9B6DFF;--violet-l:#C4A8FF;--violet-d:#6B3FD4;
  --pink:#FF6B9D;--green:#6BFFB8;--green-d:#1A5C3A;
  --yellow:#FFE566;--red:#FF6B6B;--white:#F5F0FF;
  --muted:#9B8EC4;--muted2:#5A4880;
  --border:rgba(155,109,255,0.2);--border2:rgba(155,109,255,0.45);
  --r:16px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;font-size:15px;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(155,109,255,0.07) 1px,transparent 1px);background-size:22px 22px;pointer-events:none;z-index:0;}

/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:60px;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;}
.bnav-btn.active{color:var(--violet-l);}
.bnav-icon{font-size:1.2rem;}
.bnav-label{font-size:10px;font-weight:500;}

/* PAGES */
.page{display:none;padding:1rem;padding-bottom:80px;max-width:680px;margin:0 auto;position:relative;z-index:1;}
.page.active{display:block;}

/* TYPOGRAPHY */
.page-title{font-family:'Caveat',cursive;font-size:1.8rem;font-weight:700;color:var(--violet-l);}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px;margin-bottom:1.25rem;}
.section-title{font-family:'Caveat',cursive;font-size:1.2rem;color:var(--violet-l);margin:1rem 0 .5rem;}

/* BUTTONS */
.btn-primary{width:100%;background:var(--violet);color:#fff;border:none;border-radius:var(--r);padding:15px;font-family:'Caveat',cursive;font-size:1.2rem;cursor:pointer;margin-top:.75rem;position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 60%);}
.btn-primary:active{transform:scale(.98);}
.btn-secondary{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r);padding:11px;font-size:13px;color:var(--muted);cursor:pointer;margin-top:8px;}
.btn-danger{width:100%;background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.4);border-radius:var(--r);padding:11px;font-size:13px;color:var(--red);cursor:pointer;margin-top:8px;}

/* WIZARD STEPS */
.wizard-steps{display:flex;align-items:center;gap:4px;margin-bottom:1.5rem;}
.wstep{flex:1;height:4px;border-radius:4px;background:var(--muted2);transition:background .3s;}
.wstep.done{background:var(--violet);}
.wstep.active{background:var(--violet-l);}

/* VERDURA CARDS */
.verd-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;margin-bottom:8px;transition:all .15s;user-select:none;}
.verd-card.sel{background:rgba(155,109,255,0.15);border-color:var(--violet);}
.verd-emoji{font-size:1.5rem;flex-shrink:0;margin-top:2px;}
.verd-nombre{font-family:'Caveat',cursive;font-size:1.05rem;color:var(--white);}
.verd-card.sel .verd-nombre{color:var(--violet-l);}
.verd-usos{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.verd-consejo{font-size:11px;color:var(--muted2);margin-top:2px;}
.verd-check{width:22px;height:22px;border:1.5px solid var(--muted2);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:2px;}
.verd-card.sel .verd-check{background:var(--violet);border-color:var(--violet);}

/* STOCK */
.stock-grid{display:flex;flex-wrap:wrap;gap:7px;}
.stock-tag{display:flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;user-select:none;background:var(--card);}
.stock-tag.tengo{background:rgba(107,255,184,0.12);border-color:rgba(107,255,184,0.4);color:var(--green);}
.stock-tag.mucho{background:rgba(255,229,102,0.15);border-color:rgba(255,229,102,0.5);color:var(--yellow);}

/* HOY */
.alert-banner{background:rgba(255,229,102,0.1);border:1px solid rgba(255,229,102,0.4);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;}
.alert-txt{font-size:13px;color:var(--yellow);}
.alert-btn{background:var(--yellow);color:#1A0A2E;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;}

.meal-big{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.meal-big.done{opacity:.6;}
.meal-big-head{background:var(--violet-d);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.meal-big-tipo{font-family:'Caveat',cursive;font-size:1.1rem;color:#fff;font-weight:700;}
.meal-big-hora{font-size:11px;color:rgba(255,255,255,.6);}
.meal-big-body{padding:14px;}
.meal-big-nombre{font-size:15px;font-weight:500;color:var(--white);line-height:1.3;margin-bottom:4px;}
.meal-big-prep{font-size:12px;color:var(--muted);margin-bottom:10px;}
.meal-big-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.meal-btns{display:flex;gap:6px;flex-wrap:wrap;}
.action-btn{background:rgba(155,109,255,0.15);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--violet-l);padding:4px 9px;cursor:pointer;}
.action-btn.y{background:rgba(255,229,102,0.1);border-color:rgba(255,229,102,0.3);color:var(--yellow);}
.react-row{display:flex;align-items:center;gap:6px;}
.react-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:2px;}
.tick-btn{width:42px;height:42px;border:2px solid var(--border2);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;background:none;transition:all .2s;}
.tick-btn.ticked{background:var(--violet-d);border-color:var(--violet);}
.prot-badge{font-size:11px;background:rgba(107,255,184,0.15);color:var(--green);padding:2px 8px;border-radius:20px;border:1px solid rgba(107,255,184,0.3);}

.complete-card{background:rgba(107,255,184,0.1);border:1px solid rgba(107,255,184,0.3);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:1rem;}
.complete-emoji{font-size:2.5rem;margin-bottom:6px;}
.complete-title{font-family:'Caveat',cursive;font-size:1.4rem;color:var(--green);}
.complete-sub{font-size:13px;color:var(--muted);margin-top:4px;}

/* SEMANA */
.semana-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.semana-head{background:var(--violet-d);padding:9px 14px;display:flex;justify-content:space-between;align-items:center;}
.semana-dia{font-family:'Caveat',cursive;font-size:1.1rem;color:#fff;font-weight:700;}
.semana-hoy{font-size:11px;background:var(--yellow);color:#1A0A2E;border-radius:10px;padding:1px 7px;font-weight:600;}
.semana-row{padding:9px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:65px 1fr auto;gap:8px;align-items:start;}
.semana-row:last-child{border-bottom:none;}
.semana-tipo{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding-top:2px;}
.semana-nombre{font-size:13px;font-weight:500;color:var(--white);line-height:1.3;}
.mini-btns{display:flex;gap:4px;margin-top:4px;}
.mini-btn{background:rgba(155,109,255,0.12);border:1px solid var(--border);border-radius:5px;font-size:10px;color:var(--violet-l);padding:2px 6px;cursor:pointer;}
.mini-btn.y{background:rgba(255,229,102,0.1);border-color:rgba(255,229,102,0.3);color:var(--yellow);}
.semana-prot{font-size:10px;color:var(--green);white-space:nowrap;padding-top:2px;}

/* COMPRAS */
.shop-place{font-family:'Caveat',cursive;font-size:1.1rem;color:var(--violet-l);margin-bottom:.5rem;font-weight:700;}
.shop-list{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1.25rem;}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.shop-item:last-child{border-bottom:none;}
.shop-item.checked{opacity:.4;}
.shop-item.checked .shop-text{text-decoration:line-through;}
.chk{width:20px;height:20px;border:1.5px solid var(--muted2);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--green);}
.shop-item.checked .chk{background:rgba(107,255,184,0.2);border-color:var(--green);}
.shop-text{font-size:13px;flex:1;}
.shop-qty{font-size:11px;color:var(--muted);white-space:nowrap;}
.shop-n{font-size:10px;color:var(--muted2);margin-left:3px;}
.stat-row{display:flex;gap:8px;margin-bottom:1rem;}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;text-align:center;}
.stat-num{font-family:'Caveat',cursive;font-size:1.5rem;color:var(--violet-l);}
.stat-label{font-size:11px;color:var(--muted);}
.btn-clear{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:9px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:1rem;}
.done-banner{background:rgba(107,255,184,0.1);border:1px solid rgba(107,255,184,0.3);border-radius:var(--r);padding:16px;text-align:center;margin-top:.5rem;}

/* PREP */
.prep-block{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.prep-head{background:var(--bg3);padding:10px 14px;border-bottom:1px solid var(--border);}
.prep-head-title{font-family:'Caveat',cursive;font-size:1rem;color:var(--violet-l);font-weight:700;}
.prep-head-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.prep-item{font-size:13px;color:var(--white);padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.prep-item:last-child{border-bottom:none;}
.prep-chk{width:16px;height:16px;border:1.5px solid var(--muted2);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--green);}
.prep-item.done{opacity:.5;}
.prep-item.done .prep-chk{background:rgba(107,255,184,0.2);border-color:var(--green);}
.prep-item.done .prep-text{text-decoration:line-through;}
.prep-text{flex:1;line-height:1.45;}
.timer-btn{background:rgba(255,229,102,0.15);border:1px solid rgba(255,229,102,0.3);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--yellow);cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* RECETAS */
.rfilters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.rfbtn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);}
.rfbtn.active{background:var(--violet);color:#fff;border-color:var(--violet);}
.recipe-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.recipe-card.fav{border-left:3px solid var(--pink);}
.recipe-card.mala{opacity:.5;}
.recipe-name{font-size:14px;font-weight:500;color:var(--white);line-height:1.3;}
.recipe-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.rtag{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(155,109,255,0.12);color:var(--violet-l);border:1px solid var(--border);margin:3px 3px 0 0;display:inline-block;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:1.25rem;width:100%;max-width:680px;max-height:84vh;overflow-y:auto;}
.modal-title{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--violet-l);font-weight:700;margin-bottom:1rem;}
.modal-item{padding:11px 12px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px;cursor:pointer;background:var(--card);}
.modal-item:active{background:var(--card2);}
.modal-item-name{font-size:14px;font-weight:500;color:var(--white);}
.modal-item-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.modal-close{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:14px;cursor:pointer;margin-top:.5rem;color:var(--muted);}

/* TIMER */
.timer-clock{font-family:'Caveat',cursive;font-size:4rem;color:var(--violet-l);text-align:center;padding:1rem;}
.timer-lbl{font-size:13px;color:var(--muted);text-align:center;margin-bottom:1rem;}
.timer-btns{display:flex;gap:8px;}
.timer-start{flex:1;background:var(--violet);color:#fff;border:none;border-radius:var(--r-sm);padding:11px;font-size:14px;cursor:pointer;}
.timer-stop{flex:1;background:var(--card2);color:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:14px;cursor:pointer;}

.note{background:rgba(155,109,255,0.1);border-left:3px solid var(--violet);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 14px;font-size:13px;color:var(--muted);line-height:1.6;margin-top:.75rem;}
.note strong{color:var(--violet-l);}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--violet);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:300;pointer-events:none;font-weight:500;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="page-hoy" class="page active"></div>
<div id="page-semana" class="page"></div>
<div id="page-compras" class="page"></div>
<div id="page-mas" class="page"></div>

<nav class="bnav">
  <button class="bnav-btn active" id="bn-hoy" onclick="goTo('hoy',this)"><span class="bnav-icon">☀️</span><span class="bnav-label">Hoy</span></button>
  <button class="bnav-btn" id="bn-semana" onclick="goTo('semana',this)"><span class="bnav-icon">📅</span><span class="bnav-label">Semana</span></button>
  <button class="bnav-btn" id="bn-compras" onclick="goTo('compras',this)"><span class="bnav-icon">🛒</span><span class="bnav-label">Compras</span></button>
  <button class="bnav-btn" id="bn-mas" onclick="goTo('mas',this)"><span class="bnav-icon">···</span><span class="bnav-label">Más</span></button>
</nav>

<!-- SWAP MODAL -->
<div class="modal-overlay" id="modal-swap" onclick="if(event.target===this)closeModal('modal-swap')">
  <div class="modal">
    <div class="modal-title">Cambiar plato</div>
    <div id="modal-swap-list"></div>
    <button class="modal-close" onclick="closeModal('modal-swap')">Cancelar</button>
  </div>
</div>

<!-- MOD MODAL -->
<div class="modal-overlay" id="modal-mod" onclick="if(event.target===this)closeModal('modal-mod')">
  <div class="modal">
    <div class="modal-title" id="mod-title">Modificar</div>
    <div id="mod-ing-list"></div>
    <div id="mod-opc-wrap" style="display:none;">
      <div id="mod-opc-label" style="font-size:13px;color:var(--muted);margin-bottom:10px;"></div>
      <div id="mod-opc-list"></div>
      <button class="modal-close" onclick="backMod()">← Volver</button>
    </div>
    <button class="modal-close" id="mod-cancel-btn" onclick="closeModal('modal-mod')">Cancelar</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal-confirm" onclick="if(event.target===this)closeModal('modal-confirm')">
  <div class="modal">
    <div class="modal-title">¿Empezar semana nueva?</div>
    <p id="confirm-msg" style="font-size:13px;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;"></p>
    <button class="btn-primary" onclick="confirmarNuevaSemana()">✦ Sí, empezar de nuevo</button>
    <button class="modal-close" onclick="closeModal('modal-confirm')">Cancelar</button>
  </div>
</div>

<!-- TIMER MODAL -->
<div class="modal-overlay" id="modal-timer" onclick="if(event.target===this)closeModal('modal-timer')">
  <div class="modal">
    <div class="modal-title" id="timer-title">Temporizador</div>
    <div class="timer-clock" id="timer-clock">00:00</div>
    <div class="timer-lbl" id="timer-lbl">listo para iniciar</div>
    <div class="timer-btns">
      <button class="timer-start" onclick="startTimer()">▶ Iniciar</button>
      <button class="timer-stop" onclick="resetTimer()">✕ Reiniciar</button>
    </div>
    <button class="modal-close" style="margin-top:.75rem;" onclick="closeModal('modal-timer')">Cerrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

function formatQty(ing, n) {
  const c = COMPRA[ing.toLowerCase()] || COMPRA[ing];
  if (!c) return null;
  let raw = Math.min(c.por_uso * n, c.max);
  const packs = Math.ceil(raw / c.pack);
  const qty = Math.min(packs * c.pack, c.max);
  if (c.unit === 'kg') return qty < 1 ? `${Math.round(qty*1000)}g` : `${qty}kg`;
  if (c.unit === 'g') return `${qty}g`;
  if (c.unit === 'u') return `${Math.round(qty)} u`;
  if (c.unit === 'cabeza') return `${Math.ceil(qty)} cabeza${Math.ceil(qty)>1?'s':''}`;
  if (c.unit === 'docena') return `${packs} docena${packs>1?'s':''}`;
  if (c.unit === 'pote') return `${Math.ceil(qty)} pote${Math.ceil(qty)>1?'s':''}`;
  return `${qty} ${c.unit}`;
}

const DIAS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

// ═══════════ ESTADO ═══════════
let state = {
  // wizard: 0=verduras, 1=stock, 2=generar, 3=menu listo
  wizard: 0,
  menu: [],           // [{dia, almuerzo_id, cena_id}]
  favoritos: [],
  malas: [],
  ticks: {},          // {`${dayIdx}_almuerzo`: bool}
  comprasChecked: [],
  prepChecked: [],
  stockPropio: {},    // {ing: 0|1|2}
  verdurasGanas: [],
  historial: [],
  semanaTs: null,     // timestamp del lunes de la semana generada
  currentSeason: getSeason(),
};

function getSeason(){
  const m = new Date().getMonth()+1;
  if(m>=6&&m<=8) return "invierno";
  if(m>=9&&m<=11) return "primavera";
  if(m===12||m<=2) return "verano";
  return "otoño";
}
function getLunes(){
  const d=new Date(); const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1);
  d.setDate(diff); d.setHours(0,0,0,0); return d.getTime();
}
function load(){ try{ const s=localStorage.getItem('vickyV4'); if(s) state={...state,...JSON.parse(s)}; }catch(e){} }
function save(){ localStorage.setItem('vickyV4',JSON.stringify(state)); }

// ═══════════ GENERACIÓN ═══════════
function getEligible(tipo, usedIds=[]){
  const s = state.currentSeason;
  return RECETAS.filter(r=>{
    if(r.tipo!==tipo) return false;
    if(usedIds.includes(r.id)) return false;
    if(state.malas.includes(r.id)) return false;
    return r.temporada.includes(s)||r.temporada.includes("todo");
  });
}

function weightedPick(pool){
  if(!pool.length) return null;
  const weighted=[];
  pool.forEach(r=>{
    let w=1;
    if(state.favoritos.includes(r.id)) w+=3;
    if(state.historial.slice(-14).includes(r.id)) w=Math.max(1,w-2);
    // boost si usa verduras con ganas o stock mucho
    if(r.ing) Object.keys(r.ing).forEach(ing=>{
      if((state.stockPropio[ing]||0)===2) w+=2;
      const vnom = ing.toLowerCase();
      if(state.verdurasGanas.some(v=>vnom.includes(v.toLowerCase()))) w+=2;
    });
    for(let i=0;i<Math.round(w);i++) weighted.push(r);
  });
  return weighted[Math.floor(Math.random()*weighted.length)];
}

function generarMenu(){
  const usedA=[], usedC=[];
  const menu=[];
  DIAS.forEach(dia=>{
    const pa = getEligible("almuerzo",usedA);
    const pc = getEligible("cena",usedC);
    const poolA = pa.length ? pa : getEligible("almuerzo");
    const poolC = pc.length ? pc : getEligible("cena");
    const a = weightedPick(poolA);
    const c = weightedPick(poolC);
    if(a) usedA.push(a.id);
    if(c) usedC.push(c.id);
    menu.push({dia, almuerzo_id:a?.id, cena_id:c?.id});
  });
  state.menu = menu;
  state.ticks = {};
  state.comprasChecked = [];
  state.prepChecked = [];
  state.semanaTs = getLunes();
  state.wizard = 3;
  // guardar en historial
  menu.forEach(d=>{ if(d.almuerzo_id) state.historial.push(d.almuerzo_id); if(d.cena_id) state.historial.push(d.cena_id); });
  if(state.historial.length>56) state.historial=state.historial.slice(-56);
  save();
}

// ═══════════ HOY ═══════════
function renderHoy(){
  const el = document.getElementById('page-hoy');

  // Si no hay menú o wizard no completado → mostrar wizard
  if(state.wizard < 3 || !state.menu.length){
    renderWizard(el);
    return;
  }

  const lunes = getLunes();
  const esNuevaSemana = state.semanaTs !== lunes;
  const esLunes = new Date().getDay()===1;
  const dayIdx = new Date().getDay()===0?6:new Date().getDay()-1;
  const diaMenu = state.menu[Math.min(dayIdx,6)];
  const a = diaMenu ? RECETAS.find(r=>r.id===diaMenu.almuerzo_id) : null;
  const c = diaMenu ? RECETAS.find(r=>r.id===diaMenu.cena_id) : null;
  const tickA = state.ticks[`${dayIdx}_almuerzo`]||false;
  const tickC = state.ticks[`${dayIdx}_cena`]||false;
  const ambos = tickA&&tickC;
  const fecha = new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});

  let html = `<div class="page-title">Menú de Vicky ✦</div><div class="page-sub">${fecha}</div>`;

  if(esNuevaSemana){
    html+=`<div class="alert-banner">
      <span class="alert-txt">${esLunes?'¡Es lunes! Hora de planificar 🗓':'Menú de la semana pasada'}</span>
      <button class="alert-btn" onclick="pedirNuevaSemana()">Renovar</button>
    </div>`;
  }

  if(ambos){
    html+=`<div class="complete-card">
      <div class="complete-emoji">🎉</div>
      <div class="complete-title">¡Día completo!</div>
      <div class="complete-sub">Comiste todo lo de hoy</div>
    </div>`;
  }

  if(a) html += mealBigHTML(a,dayIdx,'almuerzo',tickA);
  if(c) html += mealBigHTML(c,dayIdx,'cena',tickC);

  el.innerHTML = html;
}

function mealBigHTML(r,dayIdx,tipo,ticked){
  const isFav=state.favoritos.includes(r.id);
  const isMala=state.malas.includes(r.id);
  const icon=tipo==='almuerzo'?'🍽':'🌙';
  const hora=tipo==='almuerzo'?'12:30 – 14:00':'20:00 – 21:00';
  return `<div class="meal-big${ticked?' done':''}">
    <div class="meal-big-head">
      <div><div class="meal-big-tipo">${icon} ${tipo==='almuerzo'?'Almuerzo':'Cena'}</div><div class="meal-big-hora">${hora}</div></div>
      <span class="prot-badge">~${r.prot}g prot</span>
    </div>
    <div class="meal-big-body">
      <div class="meal-big-nombre">${r.nombre}${r.guarnicion?` · <span style="color:var(--muted);font-size:13px;">${r.guarnicion}</span>`:''}</div>
      <div class="meal-big-prep">${r.prep||''}</div>
      <div class="meal-big-footer">
        <div class="meal-btns">
          <button class="action-btn" onclick="openSwap(${dayIdx},'${tipo}')">cambiar</button>
          ${r.mod?`<button class="action-btn y" onclick="openMod(${r.id},${dayIdx},'${tipo}')">modificar</button>`:''}
        </div>
        <div class="react-row">
          <button class="react-btn" onclick="toggleFav(${r.id})">${isFav?'❤️':'🤍'}</button>
          <button class="react-btn" title="${isMala?'Restaurar':'No me gustó'}" onclick="toggleMala(${r.id})">${isMala?'👎':'🙁'}</button>
          <button class="tick-btn${ticked?' ticked':''}" onclick="toggleTick(${dayIdx},'${tipo}')">${ticked?'✓':''}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleTick(dayIdx,tipo){
  const k=`${dayIdx}_${tipo}`;
  state.ticks[k]=!state.ticks[k];
  save(); renderHoy();
}
function toggleFav(id){
  const i=state.favoritos.indexOf(id);
  if(i===-1){state.favoritos.push(id);showToast("Favorito ❤️");}
  else{state.favoritos.splice(i,1);showToast("Quitado de favoritos");}
  save(); renderHoy();
}
function toggleMala(id){
  const i=state.malas.indexOf(id);
  if(i===-1){state.malas.push(id);showToast("👎 No aparecerá más");}
  else{state.malas.splice(i,1);showToast("Restaurado ✓");}
  save(); renderHoy();
}

// ═══════════ WIZARD ═══════════
function renderWizard(el){
  const step = state.wizard; // 0=verduras, 1=stock, 2=generar
  const s = state.currentSeason;
  const sLabel={invierno:"invierno ❄️",primavera:"primavera 🌸",verano:"verano ☀️",otoño:"otoño 🍂"}[s];

  let html=`<div class="page-title">Menú de Vicky ✦</div>
  <div class="page-sub">Armemos la semana</div>
  <div class="wizard-steps">
    <div class="wstep ${step>0?'done':step===0?'active':''}"></div>
    <div class="wstep ${step>1?'done':step===1?'active':''}"></div>
    <div class="wstep ${step>2?'done':step===2?'active':''}"></div>
  </div>`;

  if(step===0){
    // PASO 1: Verduras con ganas
    const verduras = VERDURAS_ESTACION[s]||[];
    html+=`<div style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--violet-l);margin-bottom:.25rem;">¿Qué verduras tenés ganas esta semana?</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:1rem;">Verduras de ${sLabel} — tocá para marcar, van a aparecer más en el menú</div>`;
    verduras.forEach(v=>{
      const sel=state.verdurasGanas.includes(v.nombre);
      html+=`<div class="verd-card${sel?' sel':''}" onclick="toggleGanas('${v.nombre}')">
        <span class="verd-emoji">${v.emoji}</span>
        <div style="flex:1;">
          <div class="verd-nombre">${v.nombre}</div>
          <div class="verd-usos">${v.usos}</div>
          <div class="verd-consejo">💡 ${v.consejo}</div>
        </div>
        <span class="verd-check">${sel?'⭐':''}</span>
      </div>`;
    });
    html+=`<button class="btn-primary" onclick="setWizard(1)">Siguiente → ¿Qué ya tenés en casa?</button>`;
    if(state.verdurasGanas.length) html+=`<div class="note">Marcaste: <strong>${state.verdurasGanas.join(', ')}</strong></div>`;

  } else if(step===1){
    // PASO 2: Stock en casa
    const allIngs = [...new Set(RECETAS.flatMap(r=>r.ing?Object.keys(r.ing):[]))].sort();
    html+=`<div style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--violet-l);margin-bottom:.25rem;">¿Qué ya tenés en casa?</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:1rem;">⚪ no tengo &nbsp;→&nbsp; ✓ tengo &nbsp;→&nbsp; 🔥 tengo mucho</div>
    <div class="stock-grid">`;
    allIngs.forEach(ing=>{
      const lvl=state.stockPropio[ing]||0;
      const cls=lvl===2?'mucho':lvl===1?'tengo':'';
      const icon=lvl===2?'🔥':lvl===1?'✓':'⚪';
      html+=`<div class="stock-tag ${cls}" onclick="cycleStock('${ing}')">${icon} ${ing}</div>`;
    });
    html+=`</div>
    <button class="btn-primary" onclick="setWizard(2)">Siguiente → Generar menú</button>
    <button class="btn-secondary" onclick="setWizard(0)">← Volver a verduras</button>`;

  } else if(step===2){
    // PASO 3: Generar
    const conGanas=state.verdurasGanas.length;
    const conStock=Object.values(state.stockPropio).filter(v=>v>0).length;
    html+=`<div style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--violet-l);margin-bottom:1rem;">¡Todo listo para generar!</div>
    <div class="stat-row">
      <div class="stat"><div class="stat-num">${conGanas}</div><div class="stat-label">verduras con ganas</div></div>
      <div class="stat"><div class="stat-num">${conStock}</div><div class="stat-label">ingredientes en casa</div></div>
      <div class="stat"><div class="stat-num">${state.favoritos.length}</div><div class="stat-label">favoritos</div></div>
    </div>
    ${conGanas?`<div class="note" style="margin-bottom:1rem;">Con ganas de: <strong>${state.verdurasGanas.join(', ')}</strong></div>`:''}
    <button class="btn-primary" onclick="doGenerar()">✦ Generar menú de la semana</button>
    <button class="btn-secondary" onclick="setWizard(1)">← Volver al stock</button>`;
  }

  el.innerHTML = html;
}

function setWizard(n){ state.wizard=n; save(); renderHoy(); }

function toggleGanas(nombre){
  const i=state.verdurasGanas.indexOf(nombre);
  if(i===-1) state.verdurasGanas.push(nombre);
  else state.verdurasGanas.splice(i,1);
  save(); renderHoy();
}

function cycleStock(ing){
  state.stockPropio[ing]=((state.stockPropio[ing]||0)+1)%3;
  save(); renderHoy();
}

function doGenerar(){
  generarMenu();
  renderHoy(); renderSemana(); renderCompras();
  showToast("✦ ¡Menú de la semana generado!");
}

// Nueva semana
function pedirNuevaSemana(){
  const tieneGanas=state.verdurasGanas.length>0;
  document.getElementById('confirm-msg').textContent = tieneGanas
    ? `Esto borra el menú actual. Tus verduras marcadas (${state.verdurasGanas.join(', ')}) quedan como punto de partida para que las revises.`
    : 'Esto borra el menú actual y empezás el flujo de nueva semana.';
  document.getElementById('modal-confirm').classList.add('open');
}

function confirmarNuevaSemana(){
  closeModal('modal-confirm');
  // Limpiar semana pero mantener verduras como punto de partida
  state.menu=[];
  state.ticks={};
  state.comprasChecked=[];
  state.prepChecked=[];
  state.semanaTs=null;
  state.wizard=0; // volver al paso 1 (verduras)
  save();
  renderHoy();
  showToast("Nueva semana ✦");

// ═══════════ SEMANA ═══════════
function renderSemana(){
  const el=document.getElementById('page-semana');
  if(!state.menu.length){
    el.innerHTML='<div class="page-title">Semana 📅</div><p style="color:var(--muted);margin-top:1rem;font-size:14px;">Generá el menú primero.</p>';

      ${semanaRowHTML(a,i,'almuerzo')}
      ${semanaRowHTML(c,i,'cena')}

  const isFav=state.favoritos.includes(r.id);

        ${r.mod?`<button class="mini-btn y" onclick="openMod(${r.id},${dayIdx},'${tipo}')">modificar</button>`:''}
      </div>
    </div>
    <span class="semana-prot">~${r.prot}g</span>
  </div>`;
}

// ═══════════ COMPRAS ═══════════
function buildCompras(){
  if(!state.menu.length) return {};
  const counts={};
  state.menu.forEach(d=>{
    [d.almuerzo_id,d.cena_id].forEach(rid=>{
      const r=RECETAS.find(x=>x.id===rid);
      if(!r||!r.ing) return;
      Object.entries(r.ing).forEach(([ing,qty])=>{
        // Si tiene en casa (✓ o 🔥) no agregar a compras
        if((state.stockPropio[ing]||0)>=1) return;
        if(!counts[ing]) counts[ing]={qty,n:1};
        else counts[ing].n++;
      });
    });
  });
  const places={verduleria:[],dietetica:[],super_:[]};
  Object.entries(counts).forEach(([ing,data])=>{
    const qty=formatQty(ing,data.n)||data.qty;
    if(!qty) return; // condimento sin cantidad definida
    const lc=ing.toLowerCase();
    let bucket='super_';
    if(VERDULERIA_K.some(v=>lc.includes(v))) bucket='verduleria';
    else if(DIETETICA_K.some(v=>lc.includes(v))) bucket='dietetica';
    places[bucket].push({ing,qty,n:data.n});
  });
  Object.values(places).forEach(arr=>arr.sort((a,b)=>a.ing.localeCompare(b.ing)));
  return places;
}

function renderCompras(){
  const el=document.getElementById('page-compras');
  const places=buildCompras();
  const total=Object.values(places).reduce((s,a)=>s+a.length,0);
  const tachados=state.comprasChecked.length;
  const labels={verduleria:'Verdulería 🥬',dietetica:'Dietética 🫙',super_:'Super / Lácteos 🧀'};

  let html=`<div class="page-title">Compras 🛒</div>`;

  if(!total){
    html+=`<p style="color:var(--muted);margin-top:1rem;font-size:14px;">Generá el menú primero para ver la lista.</p>`;
    el.innerHTML=html; return;
  }

  html+=`<div class="stat-row">
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">ingredientes</div></div>
    <div class="stat"><div class="stat-num">${tachados}</div><div class="stat-label">tachados</div></div>
    <div class="stat"><div class="stat-num">${total-tachados}</div><div class="stat-label">faltan</div></div>
  </div>
  <button class="btn-clear" onclick="clearChecks()">Limpiar tachados</button>`;

  Object.entries(places).filter(([,arr])=>arr.length>0).forEach(([k,arr])=>{
    html+=`<div class="shop-place">${labels[k]}</div><div class="shop-list">`;
    arr.forEach(({ing,qty,n})=>{
      const key=k+'__'+ing;
      const checked=state.comprasChecked.includes(key);
      html+=`<div class="shop-item${checked?' checked':''}" onclick="toggleCheck('${key}')">
        <span class="chk">${checked?'✓':''}</span>
        <span class="shop-text">${ing}${n>1?`<span class="shop-n">(${n}x)</span>`:''}</span>
        <span class="shop-qty">${qty}</span>
      </div>`;
    });
    html+=`</div>`;
  });

  if(tachados===total&&total>0){
    html+=`<div class="done-banner">
      <div style="font-size:2rem;margin-bottom:.5rem;">🛒</div>
      <div style="font-family:'Caveat',cursive;font-size:1.3rem;color:var(--green);">¡Lista completa!</div>
      <div style="font-size:13px;color:var(--muted);margin-top:.25rem;">Todo comprado, a cocinar 🎉</div>
    </div>`;
  }
  el.innerHTML=html;
}

function toggleCheck(key){
  const i=state.comprasChecked.indexOf(key);
  if(i===-1) state.comprasChecked.push(key);
  else state.comprasChecked.splice(i,1);
  save(); renderCompras();
}
function clearChecks(){ state.comprasChecked=[]; save(); renderCompras(); }

// ═══════════ MÁS ═══════════
let masTab='prep';
let recetasFilter='todo';

function renderMas(){
  const el=document.getElementById('page-mas');
  let html=`<div class="page-title">Más ✦</div>
  <div class="rfilters">
    <button class="rfbtn${masTab==='prep'?' active':''}" onclick="setMasTab('prep')">Prep</button>
    <button class="rfbtn${masTab==='recetas'?' active':''}" onclick="setMasTab('recetas')">Recetas</button>
    <button class="rfbtn${masTab==='verduras'?' active':''}" onclick="setMasTab('verduras')">🥦 Verduras</button>
    <button class="rfbtn${masTab==='semana'?' active':''}" onclick="setMasTab('semana')">🔄 Semana</button>
  </div>`;
  if(masTab==='prep') html+=renderPrepHTML();
  else if(masTab==='recetas') html+=renderRecetasHTML();
  else if(masTab==='verduras') html+=renderVerdurasHTML();
  else html+=renderNuevaSemanaHTML();
  el.innerHTML=html;
}

function setMasTab(t){ masTab=t; renderMas(); }

function renderPrepHTML(){
  if(!state.menu.length) return '<p style="color:var(--muted);font-size:13px;text-align:center;margin-top:1rem;">Generá el menú primero.</p>';
  const bases=new Set();
  state.menu.forEach(d=>{ [d.almuerzo_id,d.cena_id].forEach(rid=>{ const r=RECETAS.find(x=>x.id===rid); if(r)bases.add(r.base); }); });
  const pasos=[];
  const ap=(texto,sec,timer=null)=>pasos.push({texto,sec,timer,key:`p_${pasos.length}`});
  if(bases.has('garbanzos')) ap("Remojar garbanzos en agua fría",'sab');
  if(bases.has('porotos')) ap("Remojar porotos en agua fría",'sab');
  if(bases.has('arvejas')) ap("Remojar arvejas en agua fría",'sab');
  if(bases.has('maíz')) ap("Remojar maíz pisado — arrancar primero el domingo",'sab');
  if(bases.has('maíz')) ap("Cocinar maíz pisado primero — 2 hs a fuego suave",'dom',{min:120,label:"Maíz pisado"});
  if(bases.has('garbanzos')||bases.has('porotos')||bases.has('arvejas')) ap("Cocinar legumbres por separado · guardar en tuppers",'dom');
  if(bases.has('pastel')) ap("Preparar puré de papa y relleno del pastel",'dom');
  ap("Dejar 2–3 huevos duros cocidos en heladera",'dom',{min:12,label:"Huevos duros"});
  if(bases.has('milanesa')) ap("Sacar milanesas del freezer la noche anterior",'mier');
  ap("Revisar tuppers · reabastecer lo que falta",'mier');
  const secs=[{k:'sab',t:'Sábado a la noche',s:'Remojo'},{k:'dom',t:'Domingo',s:'Cocción bulk · 2–3 hs'},{k:'mier',t:'Miércoles',s:'Recarga · 15 min'}];
  let html='';
  secs.forEach(sec=>{
    const items=pasos.filter(p=>p.sec===sec.k);
    if(!items.length) return;
    html+=`<div class="prep-block"><div class="prep-head"><div class="prep-head-title">${sec.t}</div><div class="prep-head-sub">${sec.s}</div></div>`;
    items.forEach(p=>{
      const done=state.prepChecked.includes(p.key);
      html+=`<div class="prep-item${done?' done':''}" onclick="togglePrep('${p.key}')">
        <span class="prep-chk">${done?'✓':''}</span>
        <span class="prep-text">${p.texto}</span>
        ${p.timer?`<button class="timer-btn" onclick="event.stopPropagation();openTimer(${p.timer.min},'${p.timer.label}')">⏱ ${p.timer.min>=60?(p.timer.min/60)+'h':p.timer.min+'min'}</button>`:''}
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`<div class="note"><strong>Tip:</strong> las milanesas van directo al freezer cuando llegan de la dietética. Sacalas la noche anterior.</div>`;
  return html;
}

function togglePrep(key){
  const i=state.prepChecked.indexOf(key);
  if(i===-1) state.prepChecked.push(key);
  else state.prepChecked.splice(i,1);
  save(); renderMas();
}

function renderRecetasHTML(){
  const tags=['todo','favoritas','malas','guiso','milanesa','polenta','sopa','pastel','verduras','huevos'];
  let html=`<div class="rfilters">
    ${tags.map(t=>`<button class="rfbtn${recetasFilter===t?' active':''}" onclick="setRecetasFilter('${t}')">${t}</button>`).join('')}
  </div>`;
  let pool=RECETAS;
  if(recetasFilter==='favoritas') pool=pool.filter(r=>state.favoritos.includes(r.id));
  else if(recetasFilter==='malas') pool=pool.filter(r=>state.malas.includes(r.id));
  else if(recetasFilter!=='todo') pool=pool.filter(r=>r.tags&&r.tags.includes(recetasFilter)||r.base===recetasFilter);
  pool.forEach(r=>{
    const isFav=state.favoritos.includes(r.id);
    const isMala=state.malas.includes(r.id);
    html+=`<div class="recipe-card${isFav?' fav':''}${isMala?' mala':''}">
      <div style="flex:1;">
        <div class="recipe-name">${r.nombre}${isMala?' 👎':''}</div>
        <div class="recipe-meta">${r.tipo} · ~${r.prot}g prot · ${r.tiempo} min</div>
        <div>${(r.tags||[]).map(t=>`<span class="rtag">${t}</span>`).join('')}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">
        <button class="react-btn" style="font-size:20px;" onclick="toggleFavR(${r.id})">${isFav?'❤️':'🤍'}</button>
        <button class="react-btn" style="font-size:16px;" onclick="toggleMalaR(${r.id})">${isMala?'👎':'🙁'}</button>
      </div>
    </div>`;
  });
  return html;
}

function setRecetasFilter(f){ recetasFilter=f; renderMas(); }
function toggleFavR(id){ const i=state.favoritos.indexOf(id); if(i===-1){state.favoritos.push(id);showToast("Favorito ❤️");}else{state.favoritos.splice(i,1);showToast("Quitado");} save(); renderMas(); }
function toggleMalaR(id){ const i=state.malas.indexOf(id); if(i===-1){state.malas.push(id);showToast("👎 No aparecerá más");}else{state.malas.splice(i,1);showToast("Restaurado ✓");} save(); renderMas(); }

function renderNuevaSemanaHTML(){
  const semanaStr = state.semanaTs
    ? new Date(state.semanaTs).toLocaleDateString('es-AR',{day:'numeric',month:'long'})
    : 'ninguna';
  return `<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:1rem;">
    <div style="font-family:'Caveat',cursive;font-size:1.1rem;color:var(--violet-l);margin-bottom:.5rem;">Semana actual</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:1rem;">Menú generado el ${semanaStr} · ${state.menu.length?'7 días planificados':'Sin menú todavía'}</div>
    <button class="btn-danger" onclick="pedirNuevaSemana()">🔄 Empezar nueva semana</button>
  </div>`;
}

function renderVerdurasHTML(){
  const s=state.currentSeason;
  const verduras=VERDURAS_ESTACION[s]||[];
  const sLabel={invierno:"Invierno ❄️",primavera:"Primavera 🌸",verano:"Verano ☀️",otoño:"Otoño 🍂"}[s];
  let html=`<div style="font-size:13px;color:var(--muted);margin:.5rem 0 1rem;">${sLabel} · tocá para marcar las que te interesan</div>`;
  verduras.forEach(v=>{
    const sel=state.verdurasGanas.includes(v.nombre);
    html+=`<div class="verd-card${sel?' sel':''}" onclick="toggleGanasR('${v.nombre}')">
      <span class="verd-emoji">${v.emoji}</span>
      <div style="flex:1;">
        <div class="verd-nombre">${v.nombre} ${sel?'⭐':''}</div>
        <div class="verd-usos">${v.usos}</div>
        <div class="verd-consejo">💡 ${v.consejo}</div>
      </div>
    </div>`;
  });
  if(state.verdurasGanas.length) html+=`<div class="note"><strong>Marcadas:</strong> ${state.verdurasGanas.join(', ')} — aparecerán más en el próximo menú.</div>`;
  return html;
}

function toggleGanasR(nombre){ const i=state.verdurasGanas.indexOf(nombre); if(i===-1){state.verdurasGanas.push(nombre);showToast(`⭐ ${nombre}`);}else{state.verdurasGanas.splice(i,1);showToast("Desmarcada");} save(); renderMas(); }

// ═══════════ SWAP ═══════════
let swapTarget=null;
function openSwap(dayIdx,tipo){
  swapTarget={dayIdx,tipo};
  const used=state.menu.map(d=>tipo==='almuerzo'?d.almuerzo_id:d.cena_id);
  const opts=getEligible(tipo,used);
  opts.sort((a,b)=>(state.favoritos.includes(b.id)?1:0)-(state.favoritos.includes(a.id)?1:0));
  document.getElementById('modal-swap-list').innerHTML=opts.slice(0,20).map(r=>`
    <div class="modal-item" onclick="doSwap(${r.id})">
      <div class="modal-item-name">${r.nombre}${state.favoritos.includes(r.id)?' ❤️':''}</div>
      <div class="modal-item-sub">~${r.prot}g prot · ${r.prep||''}</div>
    </div>`).join('');
  document.getElementById('modal-swap').classList.add('open');
}
function doSwap(id){
  if(!swapTarget) return;
  const{dayIdx,tipo}=swapTarget;
  if(tipo==='almuerzo') state.menu[dayIdx].almuerzo_id=id;
  else state.menu[dayIdx].cena_id=id;
  save(); closeModal('modal-swap'); renderHoy(); renderSemana(); renderCompras();
  showToast("Plato cambiado ✓");
}

// ═══════════ MODIFICAR ═══════════
let modState={rid:null,dayIdx:null,tipo:null,modKey:null};
function openMod(rid,dayIdx,tipo){
  modState={rid,dayIdx,tipo,modKey:null};
  const r=RECETAS.find(x=>x.id===rid);
  if(!r||!r.mod) return;
  document.getElementById('mod-title').textContent='Modificar · '+r.nombre.split(' con ')[0];
  document.getElementById('mod-ing-list').style.display='block';
  document.getElementById('mod-opc-wrap').style.display='none';
  document.getElementById('mod-cancel-btn').style.display='block';
  const labels={legumbre:'🫘 Legumbre',verdura:'🥦 Verdura',condimento:'🧂 Condimento',guarnicion:'🍽 Guarnición',queso:'🧀 Queso',salsa:'🍅 Salsa',fideo:'🍝 Fideo',base:'🥣 Base',cremoso:'🥛 Cremoso',relleno:'🥘 Relleno'};
  document.getElementById('mod-ing-list').innerHTML=
    '<div style="font-size:13px;color:var(--muted);margin-bottom:10px;">¿Qué querés cambiar?</div>'+
    Object.entries(r.mod).map(([k,opts])=>`
      <div class="modal-item" onclick="openModOpc('${k}')">
        <div class="modal-item-name">${labels[k]||k}</div>
        <div class="modal-item-sub">Opciones: ${opts.join(', ')}</div>
      </div>`).join('');
  document.getElementById('modal-mod').classList.add('open');
}
function openModOpc(key){
  const r=RECETAS.find(x=>x.id===modState.rid);
  if(!r||!r.mod[key]) return;
  modState.modKey=key;
  document.getElementById('mod-ing-list').style.display='none';
  document.getElementById('mod-opc-wrap').style.display='block';
  document.getElementById('mod-cancel-btn').style.display='none';
  const labels={legumbre:'¿Qué legumbre?',verdura:'¿Qué verdura?',condimento:'¿Qué condimento?',guarnicion:'¿Con qué guarnición?',queso:'¿Qué queso?',salsa:'¿Qué salsa?',fideo:'¿Qué fideo?',base:'¿Qué base?',cremoso:'¿Qué textura?',relleno:'¿Qué relleno?'};
  document.getElementById('mod-opc-label').textContent=labels[key]||key;
  document.getElementById('mod-opc-list').innerHTML=r.mod[key].map(o=>`
    <div class="modal-item" onclick="aplicarMod('${o.replace(/'/g,"\\'")}')">
      <div class="modal-item-name">${o}</div>
    </div>`).join('');
}
function backMod(){
  modState.modKey=null;
  document.getElementById('mod-ing-list').style.display='block';
  document.getElementById('mod-opc-wrap').style.display='none';
  document.getElementById('mod-cancel-btn').style.display='block';
}
function aplicarMod(valor){
  const{dayIdx,tipo,modKey}=modState;
  if(modKey==='guarnicion'){
    const rid=tipo==='almuerzo'?state.menu[dayIdx].almuerzo_id:state.menu[dayIdx].cena_id;
    const r=RECETAS.find(x=>x.id===rid);
    if(r) r.guarnicion=valor;
  }
  closeModal('modal-mod'); save(); renderHoy(); renderSemana();
  showToast(`✓ ${valor}`);
}

// ═══════════ TIMER ═══════════
let timerInterval=null,timerEnd=null,timerTotal=0;
function openTimer(min,label){
  timerTotal=min*60;
  document.getElementById('timer-title').textContent='⏱ '+label;
  updateTimerDisplay(timerTotal);
  document.getElementById('timer-lbl').textContent='listo para iniciar';
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById('modal-timer').classList.add('open');
}
function startTimer(){
  if(timerInterval) return;
  timerEnd=Date.now()+(timerTotal*1000);
  timerInterval=setInterval(()=>{
    const left=Math.max(0,Math.round((timerEnd-Date.now())/1000));
    updateTimerDisplay(left);
    if(left===0){clearInterval(timerInterval);timerInterval=null;document.getElementById('timer-lbl').textContent='¡Listo! ✓';showToast("¡Tiempo!");}
    else document.getElementById('timer-lbl').textContent='cocinando...';
  },1000);
}
function resetTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  updateTimerDisplay(timerTotal);
  document.getElementById('timer-lbl').textContent='listo para iniciar';
}
function updateTimerDisplay(secs){
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  document.getElementById('timer-clock').textContent=h>0?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ═══════════ NAV ═══════════
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function goTo(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  if(page==='semana') renderSemana();
  if(page==='compras') renderCompras();
  if(page==='mas') renderMas();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ═══════════ INIT ═══════════
load();
state.currentSeason=getSeason();
renderHoy();
</script>
