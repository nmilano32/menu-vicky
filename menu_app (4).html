<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menú de Vicky</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1A0A2E;--bg2:#241040;--bg3:#2E1550;--card:#2A1245;--card2:#321558;
  --violet:#9B6DFF;--violet-l:#C4A8FF;--violet-d:#6B3FD4;
  --pink:#FF6B9D;--green:#6BFFB8;--green-d:#1A5C3A;
  --yellow:#FFE566;--red:#FF6B6B;--white:#F5F0FF;
  --muted:#9B8EC4;--border:rgba(155,109,255,0.25);--border2:rgba(155,109,255,0.5);
  --r:16px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;font-size:15px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(155,109,255,0.08) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;z-index:0;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;height:58px;}
.bnav-btn{flex:1;background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .15s;font-family:'DM Sans',sans-serif;}
.bnav-btn.active{color:var(--violet-l);}
.bnav-btn .bicon{font-size:1.3rem;line-height:1;}
.bnav-btn.active .bicon{filter:drop-shadow(0 0 6px rgba(155,109,255,0.6));}

/* PAGES */
.page{display:none;padding:1rem;padding-bottom:72px;max-width:680px;margin:0 auto;position:relative;z-index:1;min-height:100vh;}
.page.active{display:block;}

/* HEADER */
.page-header{margin-bottom:1.25rem;}
.page-title{font-family:'Caveat',cursive;font-size:1.8rem;color:var(--violet-l);font-weight:700;line-height:1.1;}
.page-sub{font-size:13px;color:var(--muted);margin-top:3px;}

/* FLUJO STEPS */
.step-indicator{display:flex;gap:6px;margin-bottom:1.5rem;align-items:center;}
.step{display:flex;align-items:center;gap:6px;}
.step-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--muted);flex-shrink:0;transition:all .3s;}
.step-dot.active{background:var(--violet);border-color:var(--violet);color:#fff;}
.step-dot.done{background:var(--green-d);border-color:var(--green);color:var(--green);}
.step-label{font-size:11px;color:var(--muted);}
.step-label.active{color:var(--violet-l);font-weight:500;}
.step-sep{flex:1;height:1px;background:var(--border);}

/* VERDURAS GRID */
.verd-grid{display:flex;flex-direction:column;gap:8px;}
.verd-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px;}
.verd-card.sel{background:rgba(155,109,255,0.15);border-color:var(--violet);}
.verd-card.sel-mucho{background:rgba(255,229,102,0.12);border-color:var(--yellow);}
.verd-emoji{font-size:1.6rem;flex-shrink:0;line-height:1;margin-top:2px;}
.verd-info{flex:1;}
.verd-nombre{font-family:'Caveat',cursive;font-size:1.1rem;color:var(--white);font-weight:700;}
.verd-usos{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.verd-consejo{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;}
.verd-check{font-size:1.2rem;flex-shrink:0;margin-top:2px;}

/* STOCK GRID */
.stock-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
.stock-tag{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 11px;font-size:12px;color:var(--white);cursor:pointer;user-select:none;transition:all .15s;}
.stock-tag.tengo{background:rgba(107,255,184,0.12);border-color:rgba(107,255,184,0.4);color:var(--green);}
.stock-tag.mucho{background:rgba(255,229,102,0.12);border-color:rgba(255,229,102,0.4);color:var(--yellow);}
.stock-icon{font-size:12px;}

/* MENU HOY */
.hoy-date{font-family:'Caveat',cursive;font-size:1rem;color:var(--muted);margin-bottom:1rem;}
.meal-big{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;transition:all .3s;}
.meal-big.done{opacity:.55;border-color:rgba(155,109,255,0.1);}
.meal-big-head{background:var(--violet-d);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.meal-big-tipo{font-family:'Caveat',cursive;font-size:1.1rem;color:#fff;font-weight:700;}
.meal-big-hora{font-size:11px;color:rgba(255,255,255,0.6);}
.meal-big-body{padding:14px 16px;}
.meal-big-nombre{font-size:15px;font-weight:500;color:var(--white);line-height:1.3;margin-bottom:4px;}
.meal-big-prep{font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:10px;}
.meal-big-actions{display:flex;align-items:center;justify-content:space-between;}
.meal-big-btns{display:flex;gap:6px;}
.tilde-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--border2);background:none;cursor:pointer;font-size:1.4rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.tilde-btn.ticked{background:var(--violet);border-color:var(--violet);}
.action-btn{background:rgba(155,109,255,0.15);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--violet-l);padding:5px 10px;cursor:pointer;transition:all .15s;}
.action-btn:hover{background:var(--violet);color:#fff;}
.action-btn.yellow{background:rgba(255,229,102,0.1);border-color:rgba(255,229,102,0.3);color:var(--yellow);}
.react-btns{display:flex;gap:4px;}
.react-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px;transition:transform .15s;}
.react-btn:active{transform:scale(1.3);}

/* COMPLETE MSG */
.complete-msg{text-align:center;padding:2rem 1rem;background:var(--card);border:1px solid rgba(107,255,184,0.3);border-radius:var(--r);margin-bottom:1rem;}
.complete-emoji{font-size:3rem;margin-bottom:.5rem;}
.complete-title{font-family:'Caveat',cursive;font-size:1.4rem;color:var(--green);}
.complete-sub{font-size:13px;color:var(--muted);margin-top:.25rem;}

/* SEMANA VIEW */
.semana-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.semana-card-head{background:var(--violet-d);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;}
.semana-day{font-family:'Caveat',cursive;font-size:1rem;font-weight:700;color:#fff;}
.semana-day.hoy{color:var(--yellow);}
.semana-meal{padding:9px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:65px 1fr auto;gap:8px;align-items:center;}
.semana-meal:last-child{border-bottom:none;}
.semana-tipo{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.semana-nombre{font-size:13px;font-weight:500;color:var(--white);line-height:1.3;}
.semana-prot{font-size:11px;background:rgba(107,255,184,0.12);color:var(--green);padding:2px 7px;border-radius:20px;border:1px solid rgba(107,255,184,0.3);white-space:nowrap;}
.mini-btns{display:flex;gap:3px;margin-top:4px;}
.mini-btn{background:rgba(155,109,255,0.12);border:1px solid var(--border);border-radius:5px;font-size:10px;color:var(--violet-l);padding:2px 6px;cursor:pointer;}
.mini-btn.y{background:rgba(255,229,102,0.08);border-color:rgba(255,229,102,0.25);color:var(--yellow);}

/* COMPRAS */
.shop-place{font-family:'Caveat',cursive;font-size:1.1rem;color:var(--violet-l);margin-bottom:.5rem;font-weight:700;}
.shop-list{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1.25rem;}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.shop-item:last-child{border-bottom:none;}
.shop-item.checked{opacity:.4;}
.shop-item.checked .shop-text{text-decoration:line-through;}
.chk{width:20px;height:20px;border:1.5px solid var(--muted);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--green);transition:all .15s;}
.shop-item.checked .chk{background:rgba(107,255,184,0.2);border-color:var(--green);}
.shop-text{font-size:13px;flex:1;}
.shop-qty{font-size:12px;color:var(--muted);white-space:nowrap;}
.shop-done-msg{text-align:center;padding:1.5rem;background:rgba(107,255,184,0.08);border:1px solid rgba(107,255,184,0.3);border-radius:var(--r);margin-top:.5rem;}

/* PREP */
.prep-block{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.prep-head{background:var(--bg3);padding:11px 14px;border-bottom:1px solid var(--border);}
.prep-head-title{font-family:'Caveat',cursive;font-size:1.1rem;color:var(--violet-l);font-weight:700;}
.prep-head-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.prep-item{font-size:13px;color:var(--white);padding:9px 14px;border-bottom:1px solid var(--border);line-height:1.45;display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.prep-item:last-child{border-bottom:none;}
.prep-check{width:16px;height:16px;border:1.5px solid var(--muted);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--green);}
.prep-item.done .prep-check{background:rgba(107,255,184,0.2);border-color:var(--green);}
.prep-item.done{opacity:.5;}
.prep-item.done .prep-text{text-decoration:line-through;}
.prep-text{flex:1;}
.timer-btn{background:rgba(255,229,102,0.12);border:1px solid rgba(255,229,102,0.3);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--yellow);cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* RECETAS */
.recipe-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.filter-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s;}
.filter-btn.active{background:var(--violet);color:#fff;border-color:var(--violet);}
.recipe-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.recipe-card.favorita{border-color:var(--pink);border-left:3px solid var(--pink);}
.recipe-card.mala{opacity:.55;}
.recipe-name{font-size:14px;font-weight:500;color:var(--white);line-height:1.3;}
.recipe-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.recipe-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(155,109,255,0.15);color:var(--violet-l);border:1px solid var(--border);}

/* BTNS */
.primary-btn{width:100%;background:var(--violet);color:#fff;border:none;border-radius:var(--r);padding:15px;font-family:'Caveat',cursive;font-size:1.3rem;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.primary-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 50%);}
.primary-btn:active{transform:scale(0.98);}
.secondary-btn{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:14px;color:var(--muted);cursor:pointer;margin-top:.5rem;}
.clear-btn{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:9px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:1rem;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:1.25rem;width:100%;max-width:680px;max-height:85vh;overflow-y:auto;}
.modal-title{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--violet-l);font-weight:700;margin-bottom:1rem;}
.modal-item{padding:11px 12px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px;cursor:pointer;background:var(--card);}
.modal-item:active{background:var(--card2);}
.modal-item-name{font-size:14px;font-weight:500;color:var(--white);}
.modal-item-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.modal-close{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:14px;cursor:pointer;margin-top:.5rem;color:var(--muted);}
.modal-back{width:100%;background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:9px;font-size:13px;cursor:pointer;margin-top:.5rem;color:var(--muted);}

.note{background:rgba(155,109,255,0.08);border:1px solid var(--border);border-left:3px solid var(--violet);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 14px;font-size:13px;color:var(--muted);line-height:1.6;margin:.75rem 0;}
.note strong{color:var(--violet-l);}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--violet);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;font-weight:500;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.stat-row{display:flex;gap:8px;margin-bottom:1rem;}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;text-align:center;}
.stat-num{font-family:'Caveat',cursive;font-size:1.5rem;color:var(--violet-l);}
.stat-label{font-size:11px;color:var(--muted);}
</style>
</head>
<body>

<!-- PAGES -->
<div id="page-hoy" class="page active"></div>
<div id="page-semana" class="page"></div>
<div id="page-compras" class="page"></div>
<div id="page-mas" class="page"></div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-swap" onclick="if(event.target===this)closeModal('modal-swap')">
  <div class="modal">
    <div class="modal-title">Cambiar plato</div>
    <div id="modal-swap-list"></div>
    <button class="modal-close" onclick="closeModal('modal-swap')">Cancelar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-mod" onclick="if(event.target===this)closeModal('modal-mod')">
  <div class="modal">
    <div class="modal-title" id="mod-title">Modificar ingrediente</div>
    <div id="mod-ing-list"></div>
    <div id="mod-opc-wrap" style="display:none;">
      <div id="mod-opc-label" style="font-size:13px;color:var(--muted);margin-bottom:10px;"></div>
      <div id="mod-opc-list"></div>
      <button class="modal-back" onclick="backModStep()">← Volver</button>
    </div>
    <button class="modal-close" id="mod-cancel" onclick="closeModal('modal-mod')">Cancelar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-timer" onclick="if(event.target===this)closeModal('modal-timer')">
  <div class="modal">
    <div class="modal-title" id="timer-title">Temporizador</div>
    <div style="text-align:center;padding:1.5rem 1rem;">
      <div style="font-family:'Caveat',cursive;font-size:4rem;color:var(--violet-l);" id="timer-clock">00:00</div>
      <div style="font-size:13px;color:var(--muted);margin-top:.25rem;" id="timer-label">listo para iniciar</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:.5rem;">
      <button onclick="startTimer()" style="flex:1;background:var(--violet);color:#fff;border:none;border-radius:var(--r-sm);padding:11px;font-size:14px;cursor:pointer;">▶ Iniciar</button>
      <button onclick="resetTimer()" style="flex:1;background:var(--card2);color:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:14px;cursor:pointer;">✕ Reiniciar</button>
    </div>
    <button class="modal-close" style="margin-top:.75rem;" onclick="closeModal('modal-timer')">Cerrar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-confirm" onclick="if(event.target===this)closeModal('modal-confirm')">
  <div class="modal">
    <div class="modal-title">¿Generar nuevo menú?</div>
    <p style="font-size:14px;color:var(--muted);margin-bottom:1rem;line-height:1.5;">Vas a perder el menú actual y los tildes de la semana. ¿Seguro?</p>
    <button onclick="confirmarNuevoMenu()" style="width:100%;background:var(--violet);color:#fff;border:none;border-radius:var(--r-sm);padding:12px;font-size:14px;cursor:pointer;margin-bottom:6px;">Sí, generar nuevo menú</button>
    <button class="modal-close" onclick="closeModal('modal-confirm')">Cancelar</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-btn active" id="bnav-hoy" onclick="goTo('hoy',this)">
    <span class="bicon">☀️</span><span>Hoy</span>
  </button>
  <button class="bnav-btn" id="bnav-semana" onclick="goTo('semana',this)">
    <span class="bicon">📅</span><span>Semana</span>
  </button>
  <button class="bnav-btn" id="bnav-compras" onclick="goTo('compras',this)">
    <span class="bicon">🛒</span><span>Compras</span>
  </button>
  <button class="bnav-btn" id="bnav-mas" onclick="goTo('mas',this)">
    <span class="bicon">✦</span><span>Más</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>

const DIAS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

// ══════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════
let state = {
  // Flujo semanal
  flujoStep: 0,        // 0=sin menu, 1=verduras, 2=stock, 3=menu generado
  verdurasGanas: [],   // nombres marcados con ganas
  stockPropio: {},     // {ing: 0=no, 1=tengo, 2=mucho}
  menu: [],
  ticks: {},           // {`dia_tipo`: bool}
  comprasChecked: [],
  prepChecked: [],
  semanaGenerada: null,
  // Preferencias
  favoritos: [],
  malas: [],
  historial: [],
  currentSeason: getSeason(),
};

function getSeason(){const m=new Date().getMonth()+1;if(m>=6&&m<=8)return"invierno";if(m>=9&&m<=11)return"primavera";if(m===12||m<=2)return"verano";return"otoño";}
function getLunes(){const d=new Date();const day=d.getDay();const diff=d.getDate()-(day===0?6:day-1);d.setDate(diff);d.setHours(0,0,0,0);return d.getTime();}
function load(){try{const s=localStorage.getItem('vickyV4');if(s)state={...state,...JSON.parse(s)};}catch(e){}}
function save(){localStorage.setItem('vickyV4',JSON.stringify(state));}

// ══════════════════════════════════════════════
// GENERACIÓN
// ══════════════════════════════════════════════
function getEligible(tipo,usedIds=[]){
  const s=state.currentSeason;
  return RECETAS.filter(r=>{
    if(r.tipo!==tipo)return false;
    if(usedIds.includes(r.id))return false;
    if(state.malas.includes(r.id))return false;
    return r.temporada.includes(s)||r.temporada.includes("todo");
  });
}

function weightedPick(pool){
  const favs=state.favoritos;
  const recent=state.historial.slice(-14);
  const stock=state.stockPropio;
  const ganas=state.verdurasGanas;
  const weighted=[];
  pool.forEach(r=>{
    let w=1;
    if(favs.includes(r.id))w+=3;
    if(recent.includes(r.id))w=Math.max(1,w-2);
    if(r.ing){
      Object.keys(r.ing).forEach(ing=>{
        if(stock[ing]===2)w+=2;    // 🔥 mucho
        if(stock[ing]===1)w+=0.5; // ✓ tengo
        // boost si coincide con verdura con ganas
        if(ganas.some(g=>ing.toLowerCase().includes(g.toLowerCase())))w+=1.5;
      });
    }
    for(let i=0;i<Math.round(w);i++)weighted.push(r);
  });
  if(!weighted.length)return pool[Math.floor(Math.random()*pool.length)];
  return weighted[Math.floor(Math.random()*weighted.length)];
}

function generarMenu(){
  const usedA=[],usedC=[];
  const menu=[];
  DIAS.forEach(dia=>{
    const pa=getEligible("almuerzo",usedA);
    const pc=getEligible("cena",usedC);
    const a=weightedPick(pa.length?pa:getEligible("almuerzo"));
    const c=weightedPick(pc.length?pc:getEligible("cena"));
    usedA.push(a.id);usedC.push(c.id);
    menu.push({dia,almuerzo_id:a.id,cena_id:c.id});
  });
  state.menu=menu;
  state.ticks={};
  state.comprasChecked=[];
  state.prepChecked=[];
  state.semanaGenerada=getLunes();
  state.flujoStep=3;
  menu.forEach(d=>{state.historial.push(d.almuerzo_id,d.cena_id);});
  if(state.historial.length>56)state.historial=state.historial.slice(-56);
  save();
}

function renderHoy(){
  const el=document.getElementById('page-hoy');

  // Sin menú → flujo de arranque
  if(state.flujoStep===0||!state.menu.length){
    renderFlujoArranque(el);
    return;
  }

  // Alerta de semana nueva
  const lunes=getLunes();
  const esNuevaSemana=state.semanaGenerada!==lunes;
  const esLunes=new Date().getDay()===1;

  // Día de hoy
  const dayIdx=Math.min(new Date().getDay()===0?6:new Date().getDay()-1,6);
  const diaMenu=state.menu[dayIdx];
  if(!diaMenu){el.innerHTML='<p style="color:var(--muted);text-align:center;padding:2rem;">Sin datos para hoy.</p>';return;}

  const a=RECETAS.find(r=>r.id===diaMenu.almuerzo_id);
  const c=RECETAS.find(r=>r.id===diaMenu.cena_id);
  const tickA=state.ticks[`${dayIdx}_almuerzo`]||false;
  const tickC=state.ticks[`${dayIdx}_cena`]||false;
  const ambos=tickA&&tickC;
  const fecha=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});

  let html=`<div class="page-header">
    <div class="page-title">Menú de Vicky ✦</div>
    <div class="page-sub">${fecha}</div>
  </div>`;

  if(esNuevaSemana){
    html+=`<div style="background:rgba(255,229,102,0.1);border:1px solid rgba(255,229,102,0.4);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;color:var(--yellow);">${esLunes?'¡Es lunes! Hora de planificar la semana':'Menú de la semana pasada'}</span>
      <button onclick="pedirNuevoMenu()" style="background:var(--yellow);color:#1A0A2E;border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;">Renovar</button>
    </div>`;
  }

  if(ambos){
    html+=`<div class="complete-msg">
      <div class="complete-emoji">🎉</div>
      <div class="complete-title">¡Día completo!</div>
      <div class="complete-sub">Comiste todo lo de hoy</div>
    </div>`;
  }

  if(a) html+=mealBigHTML(a,dayIdx,'almuerzo',tickA);
  if(c) html+=mealBigHTML(c,dayIdx,'cena',tickC);

  el.innerHTML=html;
}

function renderFlujoArranque(el){
  const step=state.flujoStep;
  const steps=['Ganas','Stock','Generar'];
  const stepHTML=`<div class="step-indicator">
    ${steps.map((s,i)=>`
      <div class="step">
        <div class="step-dot ${i<step?'done':i===step?'active':''}">${i<step?'✓':i+1}</div>
        <span class="step-label ${i===step?'active':''}">${s}</span>
      </div>
      ${i<steps.length-1?'<div class="step-sep"></div>':''}`).join('')}
  </div>`;

  let html=`<div class="page-header">
    <div class="page-title">Menú de Vicky ✦</div>
    <div class="page-sub">Armemos la semana juntas</div>
  </div>${stepHTML}`;

  if(step===0){
    // PASO 1 — QUÉ TENÉS GANAS
    const s=state.currentSeason;
    const verduras=VERDURAS_ESTACION[s]||[];
    const sLabel={invierno:"invierno ❄️",primavera:"primavera 🌸",verano:"verano ☀️",otoño:"otoño 🍂"}[s];
    html+=`<div style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--violet-l);margin-bottom:.25rem;">¿Qué verduras tenés ganas esta semana?</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:1rem;">Verduras de ${sLabel} · tocá para marcar</div>
    <div class="verd-grid">`;
    verduras.forEach(v=>{
      const sel=state.verdurasGanas.includes(v.nombre);
      html+=`<div class="verd-card${sel?' sel':''}" onclick="toggleGanas('${v.nombre}')">
        <span class="verd-emoji">${v.emoji}</span>
        <div class="verd-info">
          <div class="verd-nombre">${v.nombre}</div>
          <div class="verd-usos">${v.usos}</div>
          <div class="verd-consejo">💡 ${v.consejo}</div>
        </div>
        <span class="verd-check">${sel?'⭐':''}</span>
      </div>`;
    });
    html+=`</div>
    <div style="height:1rem;"></div>
    <button class="primary-btn" onclick="avanzarPaso(1)">Siguiente → ¿Qué ya tenés en casa?</button>
    ${state.verdurasGanas.length?`<div class="note">Marcaste: <strong>${state.verdurasGanas.join(', ')}</strong></div>`:''}`;

  } else if(step===1){
    // PASO 2 — QUÉ YA TENÉS
    const allIngs=[...new Set(RECETAS.flatMap(r=>r.ing?Object.keys(r.ing):[]))].sort();
    html+=`<div style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--violet-l);margin-bottom:.25rem;">¿Qué ya tenés en casa?</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:1rem;">Tocá para ciclar: ⚪ no tengo → ✓ tengo → 🔥 tengo mucho</div>
    <div class="stock-grid">
      ${allIngs.map(ing=>{
        const lvl=state.stockPropio[ing]||0;
        const cls=lvl===2?'mucho':lvl===1?'tengo':'';
        const icon=lvl===2?'🔥':lvl===1?'✓':'⚪';
        return `<div class="stock-tag ${cls}" onclick="cycleStock('${ing}')"><span class="stock-icon">${icon}</span>${ing}</div>`;
      }).join('')}
    </div>
    <button class="primary-btn" onclick="avanzarPaso(2)" style="margin-top:1rem;">Siguiente → Generar menú</button>
    <button class="secondary-btn" onclick="avanzarPaso(0)">← Volver</button>`;

  } else if(step===2){
    // PASO 3 — GENERAR
    const conGanas=state.verdurasGanas.length;
    const conStock=Object.values(state.stockPropio).filter(v=>v>0).length;
    html+=`<div style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--violet-l);margin-bottom:1rem;">¡Todo listo para generar!</div>
    <div class="stat-row">
      <div class="stat"><div class="stat-num">${conGanas}</div><div class="stat-label">verduras con ganas</div></div>
      <div class="stat"><div class="stat-num">${conStock}</div><div class="stat-label">ingredientes en casa</div></div>
      <div class="stat"><div class="stat-num">${state.favoritos.length}</div><div class="stat-label">favoritos</div></div>
    </div>
    ${conGanas?`<div class="note">Con ganas de: <strong>${state.verdurasGanas.join(', ')}</strong></div>`:''}
    <button class="primary-btn" onclick="doGenerarMenu()">✦ Generar menú de la semana</button>
    <button class="secondary-btn" onclick="avanzarPaso(1)">← Volver al stock</button>`;
  }

  el.innerHTML=html;
}

function avanzarPaso(n){ state.flujoStep=n; save(); renderHoy(); }

function toggleGanas(nombre){
  const idx=state.verdurasGanas.indexOf(nombre);
  if(idx===-1)state.verdurasGanas.push(nombre);
  else state.verdurasGanas.splice(idx,1);
  save(); renderHoy();
}

function cycleStock(ing){
  const cur=state.stockPropio[ing]||0;
  state.stockPropio[ing]=(cur+1)%3;
  save(); renderHoy();
}

function doGenerarMenu(){
  generarMenu();
  save();
  renderHoy(); renderSemana(); renderCompras(); renderPrep();
  showToast("✦ ¡Menú generado!");
}

const VERDULERIA_K=['papa','zapallo','zanahoria','cebolla','tomate','morrón','ajo','berenjena','puerro','apio','batata','lechuga','pepino','morrón'];
const DIETETICA_K=['garbanzos','porotos','arvejas','maíz','soja texturizada','milanesa de soja','milanesa de avena','harina de maíz','fideos'];

function calcCompraQty(ing,n){
  const r=COMPRA_REAL[ing.toLowerCase()];
  if(!r)return null;
  const packs=Math.ceil((r.per*n)/r.pack);
  const qty=packs*r.pack;
  if(r.unit==='kg')return qty<1?`${qty*1000}g`:`${qty}kg`;
  if(r.unit==='g')return`${qty}g`;
  if(r.unit==='docena')return`${packs} docena${packs>1?'s':''}`;
  if(r.unit==='u')return`${qty} u`;
  if(r.unit==='botella')return'1 botella';
  return`${qty} ${r.unit}`;
}

function buildShoppingList(){
  if(!state.menu.length)return{};
  // Contar cuantas veces aparece cada ingrediente en los 7 dias
  const counts={}; // {ing: {rawQty, n (veces que aparece)}}
  state.menu.forEach(d=>{
    [d.almuerzo_id,d.cena_id].forEach(rid=>{
      const r=RECETAS.find(x=>x.id===rid);
      if(!r||!r.ing)return;
      Object.entries(r.ing).forEach(([ing,qty])=>{
        const lvl=state.stockPropio[ing]||0;
        if(lvl>=1)return; // ya tiene en casa, no comprar
        if(!counts[ing])counts[ing]={qty,n:1};
        else counts[ing].n++; // mismo ingrediente en otro dia
      });
    });
  });
  const places={verduleria:[],dietetica:[],super_:[]};
  Object.entries(counts).forEach(([ing,data])=>{
    const lc=ing.toLowerCase();
    let bucket='super_';
    if(VERDULERIA_K.some(v=>lc.includes(v)))bucket='verduleria';
    else if(DIETETICA_K.some(v=>lc.includes(v)))bucket='dietetica';
    // calcCompraQty usa data.n para calcular cantidad real de compra
    const qty=calcCompraQty(ing,data.n)||data.qty;
    places[bucket].push({ing,qty,n:data.n});
  });
  // Ordenar cada seccion alfabeticamente
  Object.values(places).forEach(arr=>arr.sort((a,b)=>a.ing.localeCompare(b.ing)));
  return places;
}

function renderCompras(){
  const el=document.getElementById('page-compras');
  const places=buildShoppingList();
  const total=Object.values(places).reduce((s,a)=>s+a.length,0);
  const tachados=state.comprasChecked.length;
  const labels={verduleria:'Verdulería 🥬',dietetica:'Dietética 🫙',super_:'Super / Lácteos 🧀'};

  let html=`<div class="page-header"><div class="page-title">Compras 🛒</div><div class="page-sub">${tachados}/${total} tachados</div></div>`;

  if(!total){
    html+=`<p style="color:var(--muted);text-align:center;margin-top:2rem;font-size:14px;">Generá el menú primero para ver la lista.</p>`;
    el.innerHTML=html; return;
  }

  html+=`<button class="clear-btn" onclick="clearChecks()">Limpiar tachados</button>`;

  Object.entries(places).filter(([,arr])=>arr.length>0).forEach(([k,arr])=>{
    html+=`<div class="shop-place">${labels[k]}</div><div class="shop-list">`;
    arr.forEach(({ing,qty,n})=>{
      const key=k+'__'+ing;
      const checked=state.comprasChecked.includes(key);
      const diasLabel=n>1?` (${n}x)`:'';
      html+=`<div class="shop-item${checked?' checked':''}" onclick="toggleCheck('${key}')">
        <span class="chk">${checked?'✓':''}</span>
        <span class="shop-text">${ing}<span style="font-size:10px;color:var(--muted2);">${diasLabel}</span></span>
        <span class="shop-qty">${qty}</span>
      </div>`;
    });
    html+=`</div><div style="height:.75rem;"></div>`;
  });

  if(tachados===total&&total>0){
    html+=`<div class="shop-done-msg">
      <div style="font-size:2rem;margin-bottom:.5rem;">🛒</div>
      <div style="font-family:'Caveat',cursive;font-size:1.3rem;color:var(--green);">¡Lista completa!</div>
      <div style="font-size:13px;color:var(--muted);margin-top:.25rem;">Todo comprado, a cocinar 🎉</div>
    </div>`;
  }

  el.innerHTML=html;
}

function toggleCheck(key){const idx=state.comprasChecked.indexOf(key);if(idx===-1)state.comprasChecked.push(key);else state.comprasChecked.splice(idx,1);save();renderCompras();}
function clearChecks(){state.comprasChecked=[];save();renderCompras();}

// ══════════════════════════════════════════════
// MÁS PAGE
// ══════════════════════════════════════════════
function renderMas(){
  const el=document.getElementById('page-mas');
  let html=`<div class="page-header"><div class="page-title">Más ✦</div></div>`;

  // Sub-tabs
  html+=`<div class="recipe-filters" id="mas-tabs">
    <button class="filter-btn active" id="tab-prep" onclick="showMasTab('prep')">Prep</button>
    <button class="filter-btn" id="tab-recetas" onclick="showMasTab('recetas')">Recetas</button>
    <button class="filter-btn" id="tab-verduras" onclick="showMasTab('verduras')">🥦 Verduras</button>
  </div>
  <div id="mas-prep-content"></div>
  <div id="mas-recetas-content" style="display:none;"></div>
  <div id="mas-verduras-content" style="display:none;"></div>`;

  el.innerHTML=html;
  renderPrepInner();
  renderRecetasInner();
  renderVerdurasInner();
}

function showMasTab(tab){
  document.getElementById('mas-prep-content').style.display=tab==='prep'?'block':'none';
  document.getElementById('mas-recetas-content').style.display=tab==='recetas'?'block':'none';
  document.getElementById('mas-verduras-content').style.display=tab==='verduras'?'block':'none';
  document.querySelectorAll('#mas-tabs .filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

function renderPrepInner(){
  const el=document.getElementById('mas-prep-content');
  if(!el)return;
  if(!state.menu.length){el.innerHTML='<p style="color:var(--muted);font-size:13px;text-align:center;margin-top:1rem;">Generá el menú primero.</p>';return;}

  const bases=new Set();
  state.menu.forEach(d=>{[d.almuerzo_id,d.cena_id].forEach(rid=>{const r=RECETAS.find(x=>x.id===rid);if(r)bases.add(r.base);});});

  const pasos=[];
  const add=(texto,sec,timer=null)=>pasos.push({texto,sec,timer,key:`prep_${pasos.length}`});
  if(bases.has('garbanzos'))add("Remojar garbanzos en agua fría",'sabado');
  if(bases.has('porotos'))add("Remojar porotos en agua fría",'sabado');
  if(bases.has('arvejas'))add("Remojar arvejas en agua fría",'sabado');
  if(bases.has('maíz'))add("Remojar maíz pisado blanco — arrancar primero el domingo",'sabado');
  if(bases.has('maíz'))add("Arrancar maíz pisado primero — 2 hs a fuego suave",'domingo',{min:120,label:"Maíz pisado"});
  if(['garbanzos','porotos','arvejas'].some(b=>bases.has(b)))add("Cocinar legumbres por separado · guardar en tuppers",'domingo');
  if(bases.has('pastel'))add("Preparar base del pastel — puré + relleno",'domingo');
  if(bases.has('pastel'))add("Gratinar el pastel el día que se come",'domingo',{min:20,label:"Gratinar"});
  add("Dejar 2–3 huevos duros en heladera",'domingo',{min:12,label:"Huevos duros"});
  if(bases.has('milanesa'))add("Sacar milanesas del freezer la noche anterior",'miercoles');
  add("Revisar tuppers · reabastecer si falta",'miercoles');

  const sections=[{key:'sabado',titulo:'Sábado a la noche',sub:'Remojo'},{key:'domingo',titulo:'Domingo',sub:'Cocción bulk · 2–3 hs'},{key:'miercoles',titulo:'Miércoles',sub:'Recarga · 15 min'}];
  let html='';
  sections.forEach(sec=>{
    const items=pasos.filter(p=>p.sec===sec.key);
    if(!items.length)return;
    html+=`<div class="prep-block"><div class="prep-head"><div class="prep-head-title">${sec.titulo}</div><div class="prep-head-sub">${sec.sub}</div></div>`;
    items.forEach(p=>{
      const done=state.prepChecked.includes(p.key);
      html+=`<div class="prep-item${done?' done':''}" onclick="togglePrep('${p.key}')">
        <span class="prep-check">${done?'✓':''}</span>
        <span class="prep-text">${p.texto}</span>
        ${p.timer?`<button class="timer-btn" onclick="event.stopPropagation();openTimer(${p.timer.min},'${p.timer.label}')">⏱ ${p.timer.min>=60?(p.timer.min/60)+'h':p.timer.min+'min'}</button>`:''}
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`<div class="note"><strong>Tip:</strong> las milanesas van directo del super al freezer. Sacarlas la noche anterior.</div>`;
  el.innerHTML=html;
}

function togglePrep(key){const idx=state.prepChecked.indexOf(key);if(idx===-1)state.prepChecked.push(key);else state.prepChecked.splice(idx,1);save();renderPrepInner();}

let activeFilter='todo';
function renderRecetasInner(){
  const el=document.getElementById('mas-recetas-content');
  if(!el)return;
  const tags=['todo','favoritas','malas','guiso','milanesa','polenta','sopa','pastel','verduras','huevos'];
  let html=`<div class="recipe-filters" style="margin-bottom:1rem;">
    ${tags.map(t=>`<button class="filter-btn${activeFilter===t?' active':''}" onclick="setFilter('${t}')">${t}</button>`).join('')}
  </div>`;
  let pool=RECETAS;
  if(activeFilter==='favoritas')pool=pool.filter(r=>state.favoritos.includes(r.id));
  else if(activeFilter==='malas')pool=pool.filter(r=>state.malas.includes(r.id));
  else if(activeFilter!=='todo')pool=pool.filter(r=>r.tags&&r.tags.includes(activeFilter)||r.base===activeFilter);
  html+=pool.map(r=>{
    const isFav=state.favoritos.includes(r.id);
    const isMala=state.malas.includes(r.id);
    return `<div class="recipe-card${isFav?' favorita':''}${isMala?' mala':''}">
      <div style="flex:1;">
        <div class="recipe-name">${r.nombre}${isMala?' 👎':''}</div>
        <div class="recipe-meta">${r.tipo} · ~${r.prot}g prot · ${r.tiempo} min</div>
        <div class="recipe-tags">${(r.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">
        <button class="react-btn" style="font-size:20px;" onclick="toggleFavR(${r.id})">${isFav?'❤️':'🤍'}</button>
        <button class="react-btn" style="font-size:16px;" onclick="toggleMalaR(${r.id})">${isMala?'👎':'·'}</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=html;
}
function setFilter(f){activeFilter=f;renderRecetasInner();}

// ══════════════════════════════════════════════
// FAVORITOS / MALAS
// ══════════════════════════════════════════════
function toggleFav(id){const idx=state.favoritos.indexOf(id);if(idx===-1){state.favoritos.push(id);showToast("Favorito ❤️");}else{state.favoritos.splice(idx,1);showToast("Quitado");}save();renderHoy();}
function toggleMala(id){const idx=state.malas.indexOf(id);if(idx===-1){state.malas.push(id);showToast("👎 No aparecerá más");}else{state.malas.splice(idx,1);showToast("Restaurado ✓");}save();renderHoy();}
function toggleFavR(id){const idx=state.favoritos.indexOf(id);if(idx===-1){state.favoritos.push(id);showToast("Favorito ❤️");}else{state.favoritos.splice(idx,1);showToast("Quitado");}save();renderRecetasInner();}
function toggleMalaR(id){const idx=state.malas.indexOf(id);if(idx===-1){state.malas.push(id);showToast("👎 No aparecerá más");}else{state.malas.splice(idx,1);showToast("Restaurado ✓");}save();renderRecetasInner();}

// ══════════════════════════════════════════════
// SWAP
// ══════════════════════════════════════════════
let swapTarget=null;
function openSwap(dayIdx,tipo){
  swapTarget={dayIdx,tipo};
  const used=state.menu.map(d=>tipo==='almuerzo'?d.almuerzo_id:d.cena_id);
  const opts=getEligible(tipo,used);
  const favs=state.favoritos;
  opts.sort((a,b)=>(favs.includes(b.id)?1:0)-(favs.includes(a.id)?1:0));
  document.getElementById('modal-swap-list').innerHTML=opts.slice(0,20).map(r=>`
    <div class="modal-item" onclick="doSwap(${r.id})">
      <div class="modal-item-name">${r.nombre}${favs.includes(r.id)?' ❤️':''}</div>
      <div class="modal-item-sub">~${r.prot}g prot · ${r.prep||''}</div>
    </div>`).join('');
  document.getElementById('modal-swap').classList.add('open');
}
function doSwap(id){
  if(!swapTarget)return;
  const{dayIdx,tipo}=swapTarget;
  if(tipo==='almuerzo')state.menu[dayIdx].almuerzo_id=id;
  else state.menu[dayIdx].cena_id=id;
  save();closeModal('modal-swap');renderHoy();renderSemana();renderCompras();
  showToast("Plato cambiado");
}

// ══════════════════════════════════════════════
// MODIFICAR
// ══════════════════════════════════════════════
let modState={recetaId:null,dayIdx:null,tipo:null};
function openMod(recetaId,dayIdx,tipo){
  modState={recetaId,dayIdx,tipo};
  const r=RECETAS.find(x=>x.id===recetaId);
  if(!r||!r.mod)return;
  document.getElementById('mod-title').textContent='Modificar · '+r.nombre.split(' con ')[0];
  document.getElementById('mod-ing-list').style.display='block';
  document.getElementById('mod-opc-wrap').style.display='none';
  document.getElementById('mod-cancel').style.display='block';
  const labels={legumbre:'🫘 Legumbre',verdura:'🥦 Verdura',condimento:'🧂 Condimento',guarnicion:'🍽 Guarnición',queso:'🧀 Queso',salsa:'🍅 Salsa',fideo:'🍝 Fideo',base:'🥣 Base',cremoso:'🥛 Cremoso',relleno:'🥘 Relleno'};
  document.getElementById('mod-ing-list').innerHTML=
    '<div style="font-size:13px;color:var(--muted);margin-bottom:10px;">¿Qué querés cambiar?</div>'+
    Object.entries(r.mod).map(([k,opts])=>`
      <div class="modal-item" onclick="openModOpc('${k}')">
        <div class="modal-item-name">${labels[k]||k}</div>
        <div class="modal-item-sub">Opciones: ${opts.join(', ')}</div>
      </div>`).join('');
  document.getElementById('modal-mod').classList.add('open');
}
function openModOpc(key){
  const r=RECETAS.find(x=>x.id===modState.recetaId);
  if(!r||!r.mod[key])return;
  document.getElementById('mod-ing-list').style.display='none';
  document.getElementById('mod-opc-wrap').style.display='block';
  document.getElementById('mod-cancel').style.display='none';
  const labels={legumbre:'¿Qué legumbre?',verdura:'¿Qué verdura?',condimento:'¿Qué condimento?',guarnicion:'¿Con qué guarnición?',queso:'¿Qué queso?',salsa:'¿Qué salsa?',fideo:'¿Qué fideo?',base:'¿Qué base?',cremoso:'¿Qué textura?',relleno:'¿Qué relleno?'};
  document.getElementById('mod-opc-label').textContent=labels[key]||key;
  document.getElementById('mod-opc-list').innerHTML=r.mod[key].map(o=>`
    <div class="modal-item" onclick="aplicarMod('${o}','${key}')">
      <div class="modal-item-name">${o}</div>
    </div>`).join('');
}
function backModStep(){
  document.getElementById('mod-ing-list').style.display='block';
  document.getElementById('mod-opc-wrap').style.display='none';
  document.getElementById('mod-cancel').style.display='block';
}
function aplicarMod(valor,key){
  const{dayIdx,tipo}=modState;
  const rid=tipo==='almuerzo'?state.menu[dayIdx].almuerzo_id:state.menu[dayIdx].cena_id;
  const r=RECETAS.find(x=>x.id===rid);
  if(r&&key==='guarnicion')r.guarnicion=valor;
  closeModal('modal-mod');save();renderHoy();renderSemana();
  showToast(`✓ Cambiado a: ${valor}`);
}

// ══════════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════════
let timerInterval=null,timerEnd=null,timerTotal=0;
function openTimer(min,label){timerTotal=min*60;document.getElementById('timer-title').textContent='⏱ '+label;updateTimerDisplay(timerTotal);document.getElementById('timer-label').textContent='listo para iniciar';if(timerInterval){clearInterval(timerInterval);timerInterval=null;}document.getElementById('modal-timer').classList.add('open');}
function startTimer(){if(timerInterval)return;timerEnd=Date.now()+(timerTotal*1000);timerInterval=setInterval(()=>{const left=Math.max(0,Math.round((timerEnd-Date.now())/1000));updateTimerDisplay(left);if(left===0){clearInterval(timerInterval);timerInterval=null;document.getElementById('timer-label').textContent='¡Listo! ✓';showToast("¡Tiempo!");}else document.getElementById('timer-label').textContent='cocinando...';},1000);}
function resetTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}updateTimerDisplay(timerTotal);document.getElementById('timer-label').textContent='listo para iniciar';}
function updateTimerDisplay(secs){const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;document.getElementById('timer-clock').textContent=h>0?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}

// ══════════════════════════════════════════════
// VERDURAS INNER (en tab Mas)
// ══════════════════════════════════════════════
function renderVerdurasInner(){
  const el=document.getElementById('mas-verduras-content');
  if(!el)return;
  const s=state.currentSeason;
  const verduras=VERDURAS_ESTACION[s]||[];
  const sLabel={invierno:"Invierno ❄️",primavera:"Primavera 🌸",verano:"Verano ☀️",otoño:"Otoño 🍂"}[s];

  let html=`<div style="font-size:13px;color:var(--muted);margin-bottom:1rem;margin-top:.5rem;">
    ${sLabel} · tocá para marcar las que te interesan ⭐
  </div>`;

  verduras.forEach(v=>{
    const sel=(state.verdurasGanas||[]).includes(v.nombre);
    html+=`<div onclick="toggleGanasVerd('${v.nombre}')" style="
      background:${sel?'rgba(155,109,255,0.15)':'var(--card)'};
      border:1px solid ${sel?'var(--violet)':'var(--border)'};
      border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;
      display:flex;align-items:flex-start;gap:12px;">
      <span style="font-size:1.4rem;flex-shrink:0;">${v.emoji}</span>
      <div style="flex:1;">
        <div style="font-family:'Caveat',cursive;font-size:1.05rem;color:${sel?'var(--violet-l)':'var(--white)'};">${v.nombre} ${sel?'⭐':''}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;">${v.usos}</div>
        <div style="font-size:11px;color:var(--muted2);margin-top:2px;">💡 ${v.consejo}</div>
      </div>
    </div>`;
  });

  if(state.verdurasGanas&&state.verdurasGanas.length){
    html+=`<div style="background:rgba(155,109,255,0.1);border:1px solid var(--border);border-left:3px solid var(--violet);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 14px;font-size:13px;color:var(--muted);line-height:1.6;margin-top:.75rem;">
      <strong style="color:var(--violet-l);">Marcadas:</strong> ${state.verdurasGanas.join(', ')} — la próxima vez que generes el menú estas verduras van a pesar más.
    </div>`;
  }

  el.innerHTML=html;
}

function toggleGanasVerd(nombre){
  if(!state.verdurasGanas)state.verdurasGanas=[];
  const idx=state.verdurasGanas.indexOf(nombre);
  if(idx===-1){state.verdurasGanas.push(nombre);showToast(`⭐ ${nombre} marcada`);}
  else{state.verdurasGanas.splice(idx,1);showToast("Desmarcada");}
  save();renderVerdurasInner();
}

// ══════════════════════════════════════════════
// MODALS / NAV
// ══════════════════════════════════════════════
function closeModal(id){document.getElementById(id).classList.remove('open');}

function goTo(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  if(page==='semana')renderSemana();
  if(page==='compras')renderCompras();
  if(page==='mas')renderMas();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
load();
renderHoy();
</script>
